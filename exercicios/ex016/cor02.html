<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* Configurações globais das CSS */
            height: 100%;
        }
        body{
            background-image: linear-gradient(to bottom, #744CBE, #C2368B, #E3415B, #F28159, #F8BB68 );
            background-attachment:fixed; /*Fundo fixo*/
        }
    </style>
</head>
<body>
    <h1>Testando Grandiente</h1>
</body>
</html>
